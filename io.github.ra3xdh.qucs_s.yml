id: io.github.ra3xdh.qucs_s
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: qucs-s
rename-desktop-file: qucs-s.desktop
rename-icon: qucs-s

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: dos2unix
    cleanup:
      - '*'
    no-autogen: true
    make-install-args:
      - prefix=${FLATPAK_DEST}
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/dos2unix/dos2unix/7.5.5/dos2unix-7.5.5.tar.gz
        sha256: 75f692b8484c8c24579a2ffd87df16b9c9428ed95497e3393a21d1ba0697ac33
        x-checker-data:
          type: anitya
          project-id: 453
          url-template: https://downloads.sourceforge.net/project/dos2unix/dos2unix/$version/dos2unix-$version.tar.gz

  - name: ngspice
    cleanup:
      - /include
      - /share/man
    config-opts:
      - --enable-cider
      - --without-x
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/46/ngspice-46.tar.gz
        sha256: a0d1699af1940b06649276dcd6ff5a566c8c0cad01b2f7b5e99dedbb4d64c19b
        x-checker-data:
          type: anitya
          project-id: 20590
          url-template: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/$version/ngspice-$version.tar.gz

  - name: qucs-s
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DWITH_QT6=ON
    sources:
      - type: archive
        url: https://github.com/ra3xdh/qucs_s/releases/download/26.1.0/qucs-s-26.1.0.tar.gz
        sha256: 1302798164ce73235b22eeb69909e2b4350320c596e01986db7cdc6f43921532
        x-checker-data:
          type: anitya
          project-id: 270911
          url-template: https://github.com/ra3xdh/qucs_s/releases/download/$version/qucs-s-$version.tar.gz
