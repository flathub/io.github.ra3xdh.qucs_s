id: io.github.ra3xdh.qucs_s
runtime: org.kde.Platform
runtime-version: 6.9
sdk: org.kde.Sdk
command: qucs-s
rename-desktop-file: qucs-s.desktop
rename-icon: qucs-s

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: dos2unix
    cleanup:
      - '*'
    no-autogen: true
    make-install-args:
      - prefix=${FLATPAK_DEST}
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/dos2unix/dos2unix/7.5.4/dos2unix-7.5.4.tar.gz
        sha256: f811a2b9e4a0c936c61ef7c1732993d1820e5cf011f4d93861885ccb8101ca21
        x-checker-data:
          type: anitya
          project-id: 453
          url-template: https://downloads.sourceforge.net/project/dos2unix/dos2unix/$version/dos2unix-$version.tar.gz

  - name: ngspice
    cleanup:
      - /include
      - /share/man
    config-opts:
      - --enable-cider
      - --without-x
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/46/ngspice-46.tar.gz
        sha256: a0d1699af1940b06649276dcd6ff5a566c8c0cad01b2f7b5e99dedbb4d64c19b
        x-checker-data:
          type: anitya
          project-id: 20590
          url-template: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/$version/ngspice-$version.tar.gz

  - name: qucs-s
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DWITH_QT6=ON
    sources:
      - type: archive
        url: https://github.com/ra3xdh/qucs_s/releases/download/25.2.0/qucs-s-25.2.0.tar.gz
        sha256: f88ac0e987555ac95e907bea211c4d3aeaea87085ed0cd76cfd52fa185971c42
        x-checker-data:
          type: anitya
          project-id: 270911
          url-template: https://github.com/ra3xdh/qucs_s/releases/download/$version/qucs-s-$version.tar.gz
